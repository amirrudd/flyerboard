version: 2
updates:
  # JavaScript/npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "amir.rudd"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      # TypeScript 7 (native compiler) isn't supported by the Convex peer deps
      # yet (convex-helpers/@convex-dev/* require ^5.5 || ^6.0.0). Revisit when
      # convex-helpers widens its typescript peer range.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      # Group ALL non-major production dependencies
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Group ALL dev dependencies (minor and patch)
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Group major updates separately for careful review
      major-updates:
        update-types:
          - "major"
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
