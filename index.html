<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#ef4444" id="theme-color-meta" />
  <script>
    (function() {
      try {
        const storageKey = 'flyerboard-ui-theme';
        const theme = localStorage.getItem(storageKey) || 'system';
        const root = document.documentElement;
        
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json?v=2" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=2" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48x48.png" />

  <link rel="stylesheet" href="/src/index.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Both families in one request, discovered at HTML-parse time. Fraunces
       (headings) must stay here — loading it from CSS (@import) serializes it
       behind the bundled stylesheet and delays above-the-fold text. -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <title>FlyerBoard</title>
  <meta name="description" content="FlyerBoard — your local classified marketplace. Buy, sell, trade, and exchange in your community." />

  <!-- Default share card for any route without its own (homepage, static pages,
       and the fallback for /ad, /bundle, /sale, /blog before middleware.ts
       replaces these tags). og:image must be absolute per the OG spec — a
       relative path here is silently ignored by some crawlers. Routed through
       the same Cloudflare JPEG transform as every other card (see middleware.ts). -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="FlyerBoard — your local classified marketplace" />
  <meta property="og:description" content="Buy, sell, trade, and exchange in your community." />
  <meta property="og:url" content="https://www.flyerboard.com.au/" />
  <meta property="og:image" content="https://www.flyerboard.com.au/cdn-cgi/image/format=jpeg,quality=82/og-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.flyerboard.com.au/cdn-cgi/image/format=jpeg,quality=82/og-preview.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
