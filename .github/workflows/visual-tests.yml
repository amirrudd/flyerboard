name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.tsx'
      - 'src/**/*.css'
      - 'tailwind.config.js'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/visual-tests.yml'

permissions:
  contents: write

jobs:
  visual:
    runs-on: ubuntu-latest
    env:
      # The suite runs against a LOCAL anonymous Convex backend running THIS
      # branch's functions, seeded below. It used to point at prod, which broke
      # by construction whenever a PR's first paint depended on a not-yet-deployed
      # Convex function (new frontend + old prod backend → boot error → every
      # test times out). In a non-interactive shell with no existing config the
      # Convex CLI auto-provisions the local backend without a login.
      # VITE_DESCOPE_PROJECT_ID is a public client-side value, not a secret.
      VITE_CONVEX_URL: http://127.0.0.1:3210
      VITE_DESCOPE_PROJECT_ID: P363bEaEDNeBq3fLWpNjbiUvuloU
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Start local Convex backend (this branch's functions)
        run: |
          nohup npx convex dev > convex-dev.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3210/version > /dev/null && break
            sleep 2
          done
          curl -sf http://127.0.0.1:3210/version > /dev/null || { echo "Convex local backend never came up"; tail -50 convex-dev.log; exit 1; }

      - name: Seed backend data
        # layout.spec.ts masks the ads grid but asserts the seeded "Vehicles"
        # category renders (proves the app booted and Convex data flows).
        # Retry: the backend port opens before the CLI finishes pushing this
        # branch's functions, so the first attempts can hit "function not found".
        run: |
          for i in $(seq 1 15); do
            npx convex run sampleData:clearAndCreateSampleData && exit 0
            sleep 4
          done
          echo "Seeding never succeeded"; tail -50 convex-dev.log; exit 1

      - name: Run visual tests
        id: visual-test
        run: |
          npx playwright test --project='Desktop Chrome' 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true
        
      - name: Check if snapshots are missing
        id: check-snapshots
        if: steps.visual-test.outcome == 'failure'
        run: |
          HAS_MISSING=false
          if grep -qi "snapshot doesn't exist" test-output.log 2>/dev/null; then
            HAS_MISSING=true
          fi
          echo "missing=$HAS_MISSING" >> $GITHUB_OUTPUT

      # Bootstrap path: a brand-new screenshot has no Linux baseline yet.
      # Generate it, commit it to the PR branch, and re-run the suite against
      # it. If tests fail for any OTHER reason (timeout, crash, real visual
      # diff), this step doesn't run and the job fails below — the gate
      # defaults to failing, not to an allowlist of recognized failures.
      - name: Update missing snapshots
        if: steps.check-snapshots.outputs.missing == 'true'
        run: npx playwright test --project='Desktop Chrome' --update-snapshots
        
      - name: Commit updated snapshots
        if: steps.check-snapshots.outputs.missing == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add e2e/layout.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No new snapshots to commit"
          else
            git commit -m "chore: add missing visual regression snapshots (Linux)"
            git pull --rebase origin ${{ github.head_ref }}
            git push origin HEAD:${{ github.head_ref }}
          fi

        
      - uses: actions/upload-artifact@v7
        if: steps.check-snapshots.outputs.missing == 'true'
        with:
          name: playwright-snapshots-linux
          path: e2e/layout.spec.ts-snapshots/
          retention-days: 30

      - uses: actions/upload-artifact@v7
        if: steps.visual-test.outcome == 'failure'
        with:
          name: visual-regression-report
          path: playwright-report/

      - name: Fail on test failures
        if: steps.visual-test.outcome == 'failure' && steps.check-snapshots.outputs.missing != 'true'
        run: |
          echo "::error::Visual/E2E tests failed (regression, timeout, or crash). See the 'visual-regression-report' artifact and test-output.log above."
          echo "ℹ️  If UI changes are intentional, update baselines with 'npm run test:visual:update' — or delete the stale e2e/layout.spec.ts-snapshots/*-linux.png so CI regenerates them."
          exit 1

