name: Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (Convex)
        run: npx tsc -p convex -noEmit

      # `tsc -p .` is a no-op (root tsconfig is references-only); `tsc -b`
      # follows the project references and actually type-checks src/.
      - name: TypeScript type check (Frontend)
        run: npx tsc -b

      - name: Run tests
        run: npm run test -- --run

      - name: Production build
        run: npm run build
